name: jsEval Tests CI
on:
  pull_request:
    paths:
      - 'packages/jsEval/**'
      - '.github/workflows/jseval-tests.yml'
jobs:
  test-js-eval:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm test -w @my-code/js-eval
